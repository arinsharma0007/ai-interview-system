{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | Interview System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'accounts/css/style_v2.css' %}?v=20260403" />
  </head>
  <body>
    <main class="auth-screen">
      <section class="auth-card">
        <h3 class="auth-title">Create account</h3>
        <p class="auth-subtitle">Set up your interviewer workspace credentials.</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" class="row g-3">
          {% csrf_token %}
          <div class="col-12">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required />
          </div>
          <div class="col-12">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required />
          </div>
          <div class="col-12 mt-1">
            <button type="submit" class="btn btn-primary w-100">Register</button>
          </div>
        </form>

        <p class="text-center text-muted mt-3 mb-0">
          Already registered? <a href="{% url 'login' %}">Login</a>
        </p>
      </section>
    </main>
  </body>
</html>
