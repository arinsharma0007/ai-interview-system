{% extends "accounts/base.html" %}
{% block title %}Question Form | Interview System{% endblock %}
{% block content %}
<div class="qform-wrapper mx-auto">
  <span class="page-kicker"><i class="bi bi-pencil-square"></i> Question Form</span>
  <h2>{{ title }}</h2>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="qform-buttons">
      <a href="{% url 'question_list' %}" class="btn btn-outline-secondary">Back</a>
      <button type="submit" class="btn btn-primary">Save</button>
    </div>
  </form>
</div>
{% endblock %}
