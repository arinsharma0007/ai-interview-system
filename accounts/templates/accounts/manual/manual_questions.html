<!-- Manual Questions given by the Intereviewer -->
{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Manual Questions</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h2>Manual Interview Questions</h2>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label>Question</label>
          <textarea name="question" class="form-control" required></textarea>
        </div>
        <div class="mb-3">
          <label>Subject</label>
          <input type="text" name="subject" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary">Add Question</button>
      </form>

      <h3 class="mt-5">Existing Questions</h3>
      <ul class="list-group">
        {% for q in questions %}
        <li class="list-group-item">{{ q.subject }}: {{ q.text }}</li>
        {% empty %}
        <li class="list-group-item">No questions yet.</li>
        {% endfor %}
      </ul>
    </div>
  </body>
</html>
