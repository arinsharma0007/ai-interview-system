{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(120deg, #6a11cb 0%, #2575fc 100%);
        color: white;
        font-family: Arial, sans-serif;
      }
      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
      }
      .hero-content h1 {
        font-size: 3rem;
        font-weight: bold;
      }
      .hero-content p {
        font-size: 1.2rem;
        margin-top: 15px;
        color: #e0e0e0;
      }
      .btn-dashboard {
        margin-top: 25px;
        padding: 12px 30px;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 50px;
        transition: all 0.3s ease;
      }
      .btn-dashboard:hover {
        transform: scale(1.05);
        box-shadow: 0px 4px 15px rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="hero-section">
      <div class="hero-content">
        <img
          src="{% static 'accounts/images/logo.png' %}"
          alt="Logo"
          class="mb-4"
          style="width: 120px"
        />
        <h1>Welcome to the Interview System</h1>
        <p>
          Manage candidates, assign questions, and evaluate results — all in one
          place.
        </p>
        <a
          href="{% url 'interviewer' %}"
          class="btn btn-light text-primary btn-dashboard"
        >
          🚀 Go to Dashboard
        </a>
      </div>
    </div>
  </body>
</html>
