{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'accounts/css/style_v2.css' %}?v=20260403" />
  </head>
  <body class="app-body">
    <div class="hero-wrap container app-shell px-3 px-md-4 py-5">
      <section class="surface-card p-4 p-md-5 text-center">
        <img
          src="{% static 'accounts/images/logo.png' %}"
          alt="Interview System"
          class="mb-4"
          style="width: 96px; height: 96px; border-radius: 20px; box-shadow: 0 14px 28px rgba(15, 33, 70, 0.24);"
        />
        <div class="page-kicker mx-auto mb-3"><i class="bi bi-stars"></i> AI Interview Workspace</div>
        <h1 class="page-title mb-3">Hiring decisions, made simpler</h1>
        <p class="page-subtitle mx-auto mb-4">
          Manage candidates, assign tailored questions, and review interview performance from one clear dashboard.
        </p>
        <a href="{% url 'interviewer' %}" class="btn btn-primary btn-lg px-4">Open Dashboard</a>
      </section>
    </div>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </body>
</html>
