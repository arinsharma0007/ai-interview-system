{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Interview System{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'accounts/images/logo.png' %}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'accounts/css/style_v2.css' %}?v=20260403" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    {% block extra_head %}{% endblock %}
  </head>
  <body class="app-body">
    <div class="app-bg-orb app-bg-orb-1"></div>
    <div class="app-bg-orb app-bg-orb-2"></div>

    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container app-shell px-3 px-md-4">
        <a class="navbar-brand app-brand" href="{% url 'interviewer' %}">
          <img
            src="{% static 'accounts/images/logo.png' %}"
            alt="Interview System"
            class="app-logo"
          />
          <div>
            <span class="app-brand-title">Interview System</span>
            <span class="app-brand-subtitle">Smart hiring workspace</span>
          </div>
        </a>
      </div>
    </nav>

    <main class="container app-shell page-shell px-3 px-md-4 py-4 py-md-5">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
