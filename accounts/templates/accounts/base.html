{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title%}Interview System{% endblock %}</title>

    <link
      rel="icon"
      type="image/png"
      href="{% static 'accounts/images/logo.png' %}"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'accounts/css/style_v2.css' %}" />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <!-- Navbar / Logo -->
    <nav class="navbar navbar-light bg-light shadow-sm px-3 bg-dark">
      <a class="navbar-brand d-flex align-items-center" href="/interviewer">
        <img
          src="{% static 'accounts/images/logo.png' %}"
          alt="Logo"
          height="40"
          class="me-2"
        />
        <span class="fw-bold interview-system">Interview System</span>
      </a>
    </nav>

    <!-- Page Content -->
    <div class="container mt-4">{% block content %}{% endblock %}</div>
  </body>
</html>
<style>
  .interview-system {
    color: white;
  }
</style>
