{% extends "accounts/base.html" %} {% load static %} {% block content %}
<div class="container mt-5">
  <h3>Assign Questions to {{ candidate.name }}</h3>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      {% for question in questions %}
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          name="questions"
          value="{{ question.id }}"
          {%
          if
          question
          in
          candidate.assigned_questions.all
          %}checked{%
          endif
          %}
        />
        <label class="form-check-label">{{ question.text }}</label>
      </div>
      {% empty %}
      <p>No questions available.</p>
      {% endfor %}
    </div>
    <button type="submit" class="btn btn-success btn4">Assign Selected</button>
    <a
      href="{% url 'select_candidate_for_assignment' %}"
      class="btn btn-secondary"
      >Back</a
    >
  </form>
</div>
{% endblock %}
